name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required permissions for the official Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; new pushes cancel the in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # base-href must match the repo name so asset paths resolve correctly
      # on GitHub Pages (served at /battletech_calc/, not /).
      - name: Build web
        run: flutter build web --release --base-href /battletech_calc/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4